name: Busybox Compatibility

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  busybox-compat:
    name: Busybox Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download busybox testsuite
        run: |
          mkdir -p busybox-testsuite
          BASE="https://raw.githubusercontent.com/mirror/busybox/master/testsuite"
          for f in testing.sh cat.tests grep.tests \
                   mkdir.tests rm.tests cp.tests mv.tests chmod.tests pwd.tests; do
            curl -fsSL "$BASE/$f" -o "busybox-testsuite/$f" \
              && echo "Downloaded $f" \
              || echo "Skipped $f (not found upstream)"
          done

      - name: Set up brsh command wrappers
        run: |
          chmod +x bin/brsh-cmd.js
          mkdir -p brsh-bin
          for cmd in echo cat grep ls mkdir rm cp mv chmod pwd which true false; do
            ln -sf "$GITHUB_WORKSPACE/bin/brsh-cmd.js" "$GITHUB_WORKSPACE/brsh-bin/$cmd"
          done
          echo "$GITHUB_WORKSPACE/brsh-bin" >> "$GITHUB_PATH"

      - name: Run busybox tests
        env:
          # Pre-set ECHO so testing.sh skips its gcc-based auto-detection.
          # The system sh builtin echo doesn't support -ne on Ubuntu (dash),
          # which would cause testing.sh to try to compile ../scripts/echo.c.
          # Use coreutils /bin/echo (not our brsh wrapper) — brsh-cmd.js appends
          # an extra \n to every stdOut line, which would corrupt the expected
          # files that testing.sh writes with "echo -ne".
          ECHO: /bin/echo
          # Enable optional blocks for features brsh implements
          OPTIONFLAGS: ":FEATURE_CATN:FEATURE_GREP_EGREP_ALIAS:"
        run: |
          cd busybox-testsuite

          total_pass=0
          total_fail=0
          ran_suites=""
          skipped_suites=""

          for suite in cat grep mkdir rm cp mv chmod pwd; do
            testfile="${suite}.tests"
            if [ ! -f "$testfile" ]; then
              skipped_suites="$skipped_suites $suite(missing)"
              continue
            fi

            ran_suites="$ran_suites $suite"
            echo "──────────────────────────────"
            echo "Suite: $testfile"

            output=$(sh "$testfile" 2>&1) || true
            echo "$output"

            # testing.sh outputs "PASS: name" and "FAIL: name" per test
            # Use absolute path to avoid resolving to our brsh grep wrapper
            passed=$(/usr/bin/grep -c "^PASS:" <<< "$output" || true)
            failed=$(/usr/bin/grep -c "^FAIL:" <<< "$output" || true)
            total_pass=$((total_pass + passed))
            total_fail=$((total_fail + failed))
          done

          echo ""
          echo "══════════════════════════════"
          echo "Suites run:    $ran_suites"
          [ -n "$skipped_suites" ] && echo "Suites skipped:$skipped_suites"
          echo "Total passed:  $total_pass"
          echo "Total failed:  $total_fail"
          echo "══════════════════════════════"

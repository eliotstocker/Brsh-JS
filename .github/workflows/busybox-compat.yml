name: Busybox Compatibility

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  busybox-compat:
    name: Busybox Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set up brsh command wrappers
        run: |
          chmod +x bin/brsh-cmd.js
          mkdir -p brsh-bin
          for cmd in echo cat grep ls mkdir rm cp mv chmod pwd which true false busybox; do
            ln -sf "$GITHUB_WORKSPACE/bin/brsh-cmd.js" "$GITHUB_WORKSPACE/brsh-bin/$cmd"
          done
          echo "$GITHUB_WORKSPACE/brsh-bin" >> "$GITHUB_PATH"

      - name: Download busybox .tests suites (testing.sh format)
        run: |
          mkdir -p busybox-testsuite
          BASE="https://raw.githubusercontent.com/mirror/busybox/master/testsuite"
          for f in testing.sh cat.tests grep.tests \
                   mkdir.tests rm.tests cp.tests mv.tests chmod.tests pwd.tests; do
            curl -fsSL "$BASE/$f" -o "busybox-testsuite/$f" \
              && echo "Downloaded $f" \
              || echo "Skipped $f (not found upstream)"
          done

      - name: Run busybox .tests suites
        env:
          # Pre-set ECHO so testing.sh skips its gcc-based auto-detection.
          # The system sh builtin echo doesn't support -ne on Ubuntu (dash),
          # which would cause testing.sh to try to compile ../scripts/echo.c.
          # Use coreutils /bin/echo (not our brsh wrapper) — brsh-cmd.js appends
          # an extra \n to every stdOut line, which would corrupt the expected
          # files that testing.sh writes with "echo -ne".
          ECHO: /bin/echo
          # Enable optional blocks for features brsh implements
          OPTIONFLAGS: ":FEATURE_CATN:FEATURE_GREP_EGREP_ALIAS:"
        run: |
          cd busybox-testsuite

          total_pass=0
          total_fail=0
          ran_suites=""
          skipped_suites=""

          for suite in cat grep mkdir rm cp mv chmod pwd; do
            testfile="${suite}.tests"
            if [ ! -f "$testfile" ]; then
              skipped_suites="$skipped_suites $suite(missing)"
              continue
            fi

            ran_suites="$ran_suites $suite"
            echo "──────────────────────────────"
            echo "Suite: $testfile"

            output=$(sh "$testfile" 2>&1) || true
            echo "$output"

            # testing.sh outputs "PASS: name" and "FAIL: name" per test
            # Use absolute path to avoid resolving to our brsh grep wrapper
            passed=$(/usr/bin/grep -c "^PASS:" <<< "$output" || true)
            failed=$(/usr/bin/grep -c "^FAIL:" <<< "$output" || true)
            total_pass=$((total_pass + passed))
            total_fail=$((total_fail + failed))
          done

          echo ""
          echo "══════════════════════════════"
          echo "Suites run:    $ran_suites"
          [ -n "$skipped_suites" ] && echo "Suites skipped:$skipped_suites"
          echo "Total passed:  $total_pass"
          echo "Total failed:  $total_fail"
          echo "══════════════════════════════"

      - name: Download busybox individual test suites
        run: |
          mkdir -p busybox-indiv
          API="https://api.github.com/repos/mirror/busybox/contents/testsuite"
          for dir in pwd rm mkdir mv cat echo cp; do
            mkdir -p "busybox-indiv/$dir"
            urls=$(curl -fsSL "$API/$dir" \
              | python3 -c "import sys,json; [print(e['download_url']) for e in json.load(sys.stdin) if e['type']=='file']" \
              2>/dev/null || true)
            for url in $urls; do
              fname=$(basename "$url")
              curl -fsSL "$url" -o "busybox-indiv/$dir/$fname" \
                && echo "Downloaded $dir/$fname" \
                || echo "Skipped $dir/$fname"
            done
          done

      - name: Run busybox individual tests
        run: |
          total_pass=0
          total_fail=0
          total_skip=0

          for dir in busybox-indiv/pwd busybox-indiv/rm busybox-indiv/mkdir \
                     busybox-indiv/mv busybox-indiv/cat busybox-indiv/echo \
                     busybox-indiv/cp; do
            applet=$(basename "$dir")
            [ -d "$dir" ] || continue

            for testfile in "$dir"/*; do
              [ -f "$testfile" ] || continue
              testname=$(basename "$testfile")

              # Skip tests with FEATURE guards (requires busybox .config knowledge)
              if /usr/bin/grep -q "^# FEATURE:" "$testfile" 2>/dev/null; then
                echo "SKIP: $applet/$testname (feature guard)"
                total_skip=$((total_skip + 1))
                continue
              fi

              tmpdir=$(mktemp -d)
              (cd "$tmpdir" && sh -e "$GITHUB_WORKSPACE/$testfile" >/dev/null 2>&1)
              result=$?
              rm -rf "$tmpdir"

              if [ $result -eq 0 ]; then
                echo "PASS: $applet/$testname"
                total_pass=$((total_pass + 1))
              else
                echo "FAIL: $applet/$testname"
                total_fail=$((total_fail + 1))
              fi
            done
          done

          echo ""
          echo "══════════════════════════════"
          echo "Total passed:  $total_pass"
          echo "Total skipped: $total_skip"
          echo "Total failed:  $total_fail"
          echo "══════════════════════════════"
